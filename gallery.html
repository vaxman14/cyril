<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Work — Chef Cyril Kabaoglu</title>
  <meta name="description" content="A visual record of 30 years at the stove — dishes, classrooms, and the moments between." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    :root {
      --bg:    #0d0d0d;
      --gold:  #c9a227;
      --cream: #f0ede8;
      --muted: #9b8a6e;
    }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 5%;
      transition: background 0.4s, border-color 0.4s, backdrop-filter 0.4s;
      border-bottom: 1px solid transparent;
    }
    nav.scrolled {
      background: rgba(13,13,13,0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom-color: rgba(255,255,255,0.06);
    }
    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      letter-spacing: 0.4em;
      color: var(--cream);
      text-decoration: none;
    }
    .nav-back {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--gold); }

    /* ── HERO ── */
    .hero {
      padding: 14rem 5% 6rem;
      text-align: center;
    }
    .hero-label {
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 6vw, 5rem);
      font-weight: 400;
      line-height: 1.1;
      color: var(--cream);
      margin-bottom: 1.5rem;
    }
    .hero h1 em {
      font-style: italic;
      color: var(--gold);
    }
    .hero-sub {
      font-size: 0.95rem;
      color: var(--muted);
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.8;
    }
    .hero-rule {
      width: 40px;
      height: 1px;
      background: var(--gold);
      margin: 2.5rem auto 0;
      opacity: 0.6;
    }

    /* ── MASONRY GALLERY ── */
    .gallery-wrap {
      padding: 4rem 3% 8rem;
      max-width: 1400px;
      margin: 0 auto;
    }
    .masonry {
      columns: 3;
      column-gap: 1.2rem;
    }
    @media (max-width: 900px) { .masonry { columns: 2; } }
    @media (max-width: 560px) { .masonry { columns: 1; } }

    .photo-card {
      break-inside: avoid;
      margin-bottom: 1.2rem;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      background: #111;
    }

    .photo-card img {
      width: 100%;
      display: block;
      transition: transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .photo-card:hover img {
      transform: scale(1.04);
    }

    /* Caption overlay */
    .caption-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 3rem 1.4rem 1.4rem;
      background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.3) 70%, transparent 100%);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .photo-card:hover .caption-overlay {
      opacity: 1;
      transform: translateY(0);
    }
    .caption-text {
      font-size: 0.82rem;
      line-height: 1.6;
      color: rgba(240,237,232,0.92);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
    }
    .caption-rule {
      width: 24px;
      height: 1px;
      background: var(--gold);
      margin-bottom: 0.6rem;
      opacity: 0.8;
    }

    /* Loading skeleton */
    .photo-card.loading {
      background: #161616;
      animation: shimmer 1.4s infinite;
    }
    .photo-card.loading::after {
      content: '';
      display: block;
      padding-top: 75%;
    }
    @keyframes shimmer {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 0.9; }
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.96);
      align-items: center;
      justify-content: center;
      padding: 2rem;
      cursor: zoom-out;
    }
    .lightbox.open {
      display: flex;
    }
    .lightbox-inner {
      display: flex;
      gap: 3rem;
      align-items: center;
      max-width: 1100px;
      width: 100%;
      cursor: default;
    }
    @media (max-width: 760px) {
      .lightbox-inner { flex-direction: column; gap: 1.5rem; }
    }
    .lightbox-img {
      flex: 1 1 60%;
      max-height: 80vh;
      object-fit: contain;
      display: block;
    }
    .lightbox-info {
      flex: 0 0 280px;
    }
    .lightbox-rule {
      width: 32px;
      height: 1px;
      background: var(--gold);
      margin-bottom: 1.2rem;
    }
    .lightbox-caption {
      font-size: 1rem;
      line-height: 1.75;
      color: var(--cream);
      font-family: 'Playfair Display', serif;
      font-style: italic;
    }
    .lightbox-counter {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 1.5rem;
    }
    .lightbox-close {
      position: fixed;
      top: 1.5rem;
      right: 2rem;
      font-size: 1.8rem;
      color: var(--muted);
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
      background: none;
      border: none;
    }
    .lightbox-close:hover { color: var(--cream); }
    .lightbox-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      font-size: 2.5rem;
      cursor: pointer;
      padding: 1rem;
      transition: color 0.2s;
      line-height: 1;
    }
    .lightbox-nav:hover { color: var(--cream); }
    .lightbox-nav.prev { left: 1rem; }
    .lightbox-nav.next { right: 1rem; }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 3rem 5%;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    footer p {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<nav id="navbar">
  <a href="index.html" class="nav-logo">CYRIL KABAOGLU</a>
  <a href="index.html" class="nav-back">← Back to site</a>
</nav>

<section class="hero">
  <p class="hero-label">Portfolio</p>
  <h1>Thirty years<br>at the <em>stove.</em></h1>
  <p class="hero-sub">Dishes, classrooms, and the moments between — a visual record of the work.</p>
  <div class="hero-rule"></div>
</section>

<div class="gallery-wrap">
  <div class="masonry" id="gallery"></div>
</div>

<footer>
  <p>Chef Cyril Kabaoglu &nbsp;·&nbsp; Los Angeles</p>
</footer>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lb-close">×</button>
  <button class="lightbox-nav prev" id="lb-prev">‹</button>
  <button class="lightbox-nav next" id="lb-next">›</button>
  <div class="lightbox-inner" id="lb-inner">
    <img class="lightbox-img" id="lb-img" src="" alt="" />
    <div class="lightbox-info">
      <div class="lightbox-rule"></div>
      <p class="lightbox-caption" id="lb-caption"></p>
      <p class="lightbox-counter" id="lb-counter"></p>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL  = 'https://vwyzkvrvodvdudxorvqt.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ3eXprdnJ2b2R2ZHVkeG9ydnF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzNTMxNjAsImV4cCI6MjA5NTkyOTE2MH0.AAZDRqVFmwrVnzJqa_rh8zGW9MvvWCzx0R4d8co9DxQ';

const IMAGES = [
  "0C75B3D2-9EED-4B65-A4B6-A7C4AEDBB0F3.PNG",
  "68013245999__EBBBF76F-CCBE-4F66-9FBD-C80579A48C7A.jpeg",
  "68132919703__6534FCDA-6DF9-4F00-9A4F-7B545010FDB2.jpeg",
  "68132923217__DD686DAF-9B91-46A9-B7EC-6E19338E952E.jpeg",
  "DSC05925.jpg",
  "Four-Course Mexican Street Food_11-2-2021_C210614B_31.jpg",
  "Four-Course Mexican Street Food_11-2-2021_C210614B_9.JPG",
  "IMG_0309.jpeg",
  "IMG_0319.jpeg",
  "IMG_0898.jpeg",
  "IMG_1646.jpeg",
  "IMG_2273.jpg",
  "IMG_2319.jpg",
  "IMG_6756.jpeg",
  "IMG_6830.jpeg",
  "IMG_6832.jpeg",
  "IMG_6880.jpeg",
  "IMG_6884.jpeg",
  "IMG_6958.jpg",
  "IMG_6962.jpg",
  "IMG_7030.jpeg",
  "IMG_7037.jpeg",
  "IMG_7039.jpeg",
  "IMG_8547.jpeg",
  "IMG_8841.jpeg",
  "IMG_9478.jpeg",
  "Resized_Resized_20240412_141418_1712956535652_1712956538591.JPG",
];

let descriptions = {};
let currentIndex = 0;
const cards = [];

async function loadDescriptions() {
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/gallery_descriptions?select=filename,description', {
      headers: { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + SUPABASE_ANON }
    });
    if (res.ok) {
      const rows = await res.json();
      rows.forEach(r => { descriptions[r.filename] = r.description; });
    }
  } catch(e) {}
}

function openLightbox(index) {
  currentIndex = index;
  const filename = IMAGES[index];
  const caption = descriptions[filename] || '';
  document.getElementById('lb-img').src = 'images/' + filename;
  document.getElementById('lb-img').alt = caption;
  document.getElementById('lb-caption').textContent = caption;
  document.getElementById('lb-counter').textContent = (index + 1) + ' of ' + IMAGES.length;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function navigate(dir) {
  currentIndex = (currentIndex + dir + IMAGES.length) % IMAGES.length;
  openLightbox(currentIndex);
}

document.getElementById('lb-close').addEventListener('click', closeLightbox);
document.getElementById('lb-prev').addEventListener('click', e => { e.stopPropagation(); navigate(-1); });
document.getElementById('lb-next').addEventListener('click', e => { e.stopPropagation(); navigate(1); });
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
});
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
});

function buildGallery() {
  const gallery = document.getElementById('gallery');
  IMAGES.forEach((filename, i) => {
    const card = document.createElement('div');
    card.className = 'photo-card';

    const img = document.createElement('img');
    img.src = 'images/' + filename;
    img.alt = descriptions[filename] || '';
    img.loading = 'lazy';

    const overlay = document.createElement('div');
    overlay.className = 'caption-overlay';

    const cap = descriptions[filename];
    if (cap) {
      const rule = document.createElement('div');
      rule.className = 'caption-rule';
      const txt = document.createElement('p');
      txt.className = 'caption-text';
      txt.textContent = cap;
      overlay.appendChild(rule);
      overlay.appendChild(txt);
    }

    card.appendChild(img);
    card.appendChild(overlay);
    card.addEventListener('click', () => openLightbox(i));

    gallery.appendChild(card);
    cards.push(card);
  });
}

// Nav scroll
window.addEventListener('scroll', () => {
  document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 40);
});

(async () => {
  await loadDescriptions();
  buildGallery();
})();
</script>
</body>
</html>
