<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chef Cyril — Gallery Descriptions</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0d;
      color: #f0ede8;
      font-family: 'Georgia', serif;
      padding: 2rem;
    }
    h1 {
      font-size: 1.4rem;
      letter-spacing: 0.2em;
      color: #c9a227;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }
    .subtitle {
      color: #9b8a6e;
      font-size: 0.9rem;
      margin-bottom: 2rem;
      font-family: 'Arial', sans-serif;
    }
    .toolbar {
      display: flex;
      gap: 1rem;
      margin-bottom: 2.5rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .save-status {
      color: #9b8a6e;
      font-size: 0.8rem;
      font-family: 'Arial', sans-serif;
      align-self: center;
    }
    .save-status.saved { color: #4caf50; }
    .save-status.error { color: #e53935; }
    .save-status.saving { color: #c9a227; }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 2rem;
    }
    .card {
      background: #161616;
      border: 1px solid #2a2a2a;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .img-wrap {
      width: 100%;
      aspect-ratio: 4/3;
      overflow: hidden;
      background: #111;
      position: relative;
    }
    .img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .img-num {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(0,0,0,0.7);
      color: #c9a227;
      font-size: 0.75rem;
      padding: 2px 7px;
      font-family: 'Arial', sans-serif;
    }
    .card-save {
      position: absolute;
      top: 8px;
      right: 8px;
      font-size: 0.7rem;
      font-family: 'Arial', sans-serif;
      padding: 2px 7px;
      background: rgba(0,0,0,0.7);
    }
    .card-save.saved { color: #4caf50; }
    .card-save.saving { color: #c9a227; }
    .card-save.error { color: #e53935; }
    .card-body {
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      flex: 1;
    }
    .filename {
      font-size: 0.7rem;
      color: #555;
      font-family: monospace;
      word-break: break-all;
    }
    .desc-label {
      font-size: 0.8rem;
      color: #9b8a6e;
      letter-spacing: 0.05em;
      font-family: 'Arial', sans-serif;
    }
    textarea {
      width: 100%;
      min-height: 80px;
      background: #0d0d0d;
      border: 1px solid #2a2a2a;
      color: #f0ede8;
      font-size: 0.9rem;
      padding: 0.6rem;
      resize: vertical;
      font-family: 'Georgia', serif;
      line-height: 1.5;
      transition: border-color 0.2s;
    }
    textarea:focus { outline: none; border-color: #c9a227; }
    textarea::placeholder { color: #444; }
  </style>
</head>
<body>

<h1>Chef Cyril — Photo Descriptions</h1>
<p class="subtitle">✨ Enhanced captions by Josi — review and edit as you like. Changes save automatically to Roman.</p>

<div class="toolbar">
  <span class="save-status" id="global-status">Loading saved descriptions...</span>
</div>

<div class="gallery" id="gallery"></div>

<script>
const SUPABASE_URL = 'https://vwyzkvrvodvdudxorvqt.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ3eXprdnJ2b2R2ZHVkeG9ydnF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzNTMxNjAsImV4cCI6MjA5NTkyOTE2MH0.AAZDRqVFmwrVnzJqa_rh8zGW9MvvWCzx0R4d8co9DxQ';

const IMAGES = [
  "0C75B3D2-9EED-4B65-A4B6-A7C4AEDBB0F3.PNG",
  "68013245999__EBBBF76F-CCBE-4F66-9FBD-C80579A48C7A.jpeg",
  "68132919703__6534FCDA-6DF9-4F00-9A4F-7B545010FDB2.jpeg",
  "68132923217__DD686DAF-9B91-46A9-B7EC-6E19338E952E.jpeg",
  "DSC05925.jpg",
  "Four-Course Mexican Street Food_11-2-2021_C210614B_31.jpg",
  "Four-Course Mexican Street Food_11-2-2021_C210614B_9.JPG",
  "IMG_0309.jpeg",
  "IMG_0319.jpeg",
  "IMG_0898.jpeg",
  "IMG_1646.jpeg",
  "IMG_2273.jpg",
  "IMG_2319.jpg",
  "IMG_6756.jpeg",
  "IMG_6830.jpeg",
  "IMG_6832.jpeg",
  "IMG_6880.jpeg",
  "IMG_6884.jpeg",
  "IMG_6958.jpg",
  "IMG_6962.jpg",
  "IMG_7030.jpeg",
  "IMG_7037.jpeg",
  "IMG_7039.jpeg",
  "IMG_8547.jpeg",
  "IMG_8841.jpeg",
  "IMG_9478.jpeg",
  "Resized_Resized_20240412_141418_1712956535652_1712956538591.JPG",
];

async function sbFetch(path, opts) {
  return fetch(SUPABASE_URL + path, {
    ...opts,
    headers: {
      'apikey': SUPABASE_ANON,
      'Authorization': 'Bearer ' + SUPABASE_ANON,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal',
      ...(opts && opts.headers)
    }
  });
}

async function loadAll() {
  const res = await sbFetch('/rest/v1/gallery_descriptions?select=filename,description', { method: 'GET' });
  if (!res.ok) return {};
  const rows = await res.json();
  const map = {};
  rows.forEach(r => { map[r.filename] = r.description; });
  return map;
}

async function upsert(filename, description) {
  const res = await sbFetch('/rest/v1/gallery_descriptions', {
    method: 'POST',
    headers: { 'Prefer': 'resolution=merge-duplicates,return=minimal' },
    body: JSON.stringify({ filename, description, updated_at: new Date().toISOString() })
  });
  return res.ok;
}

function setGlobalStatus(msg, cls) {
  const el = document.getElementById('global-status');
  el.textContent = msg;
  el.className = 'save-status' + (cls ? ' ' + cls : '');
}

const debounceTimers = {};

function onInput(filename, value, cardSaveEl) {
  cardSaveEl.textContent = 'saving…';
  cardSaveEl.className = 'card-save saving';
  clearTimeout(debounceTimers[filename]);
  debounceTimers[filename] = setTimeout(async () => {
    const ok = await upsert(filename, value);
    if (ok) {
      cardSaveEl.textContent = '✓ saved';
      cardSaveEl.className = 'card-save saved';
      setGlobalStatus('All changes saved.', 'saved');
    } else {
      cardSaveEl.textContent = '✗ error';
      cardSaveEl.className = 'card-save error';
      setGlobalStatus('Save error — check connection.', 'error');
    }
  }, 800);
}

const ENHANCED = {
  "IMG_2319.jpg": `Chef Kabaoglu demonstrating fat-to-pan technique at the stove. The right fat, the right heat, the right moment — it's the first decision in every dish.`,
  "IMG_8841.jpeg": `With Miyoko Schinner, founder of Miyoko's Creamery. Two people who take ingredients — and what goes into food — seriously.`,
  "0C75B3D2-9EED-4B65-A4B6-A7C4AEDBB0F3.PNG": `Plating class: the spiral vegetable tian. Uniform slices of zucchini, yellow squash, and tomato arranged in tight overlapping rings. The lesson isn't the recipe — it's the patience.`,
  "IMG_6756.jpeg": `Classic ratatouille — eggplant, zucchini, tomato, and pepper cooked down until they stop being separate vegetables and become one thing.`,
  "IMG_6830.jpeg": `Baby artichokes before anything happens to them. Purple-tipped, tight, still carrying some of the market on them.`,
  "IMG_9478.jpeg": `Homage to Thomas Keller — the vegetable tian from The French Laundry. Every slice the same thickness, every overlap the same distance. The kind of dish that teaches you what precision actually means.`,
  "IMG_6832.jpeg": `Baby artichoke hearts arranged for confit — trimmed, turned, and nestled into a brunoise of aromatics. Before the oil. Before the heat. The prep most people never see.`,
  "Four-Course Mexican Street Food_11-2-2021_C210614B_31.jpg": `Confit and seared octopus over beet purée, pomme purée, green herb oil, and pickled mustard seeds. The muscle memory of fine dining applied to a Mexican street food menu.`,
  "IMG_6880.jpeg": `Salmon tartare quenelles topped with caviar, alongside cucumber cylinders, heirloom tomatoes, and avocado. A plate that looks effortless until you count the techniques.`,
  "Four-Course Mexican Street Food_11-2-2021_C210614B_9.JPG": `Elote croquette — corn pressed into a crispy sphere, served over herb oil with pickled red onion on top. One bite of Mexico, plated.`,
  "IMG_0309.jpeg": `Whole branzino sealed in a salt crust, ready for the oven. The scored diamonds on top are a kitchen tradition — a little theater before the drama of the crack.`,
  "IMG_0319.jpeg": `Branzino after the salt crust — steamed in its own juices, cracked open tableside. Served with hummus, roasted tomatoes, and charred greens. Old technique, honest result.`,
  "IMG_6884.jpeg": `Financiers — individual brown butter almond cakes with a jammy berry pressed into the center. The kind of thing a Paris pâtisserie serves at 8am without explanation.`,
  "IMG_0898.jpeg": `Mise en place for a private dinner — John Dory with fingerling potato scales, all components staged on parchment. The menu written beside them: hamachi crudo, beet salad, pesto burrata. This is what the work looks like before the plates go out.`,
  "IMG_6962.jpg": `Portobello Mille-Feuille on a tasting spoon — compressed mushroom pressed into dozens of thin layers, topped with a cream quenelle and a single wild herb flower. One bite.`,
  "68132919703__6534FCDA-6DF9-4F00-9A4F-7B545010FDB2.jpeg": `Homage to Daniel Boulud — fluke crudo with roasted beet, pickled citrus, red seaweed, and cucumber gel. A composed plate that uses color like vocabulary.`,
  "68132923217__DD686DAF-9B91-46A9-B7EC-6E19338E952E.jpeg": `Fluke crudo, second composition — beet rounds, golden citrus, seaweed, and white fish pulled into a rosette. The same dish built differently. After Daniel Boulud.`,
  "DSC05925.jpg": `Homage to Julia Child — whole roasted chicken with mushrooms, pearl onions, pomme purée, and a rich pan jus finished with chive oil. The dish Julia made famous. The dish that never gets old.`,
  "IMG_7030.jpeg": `John Dory dressed in fingerling potato scales — thin rounds pressed onto the raw fillet so they crisp in the pan like a golden crust. A French technique that makes a simple piece of fish look like armor.`,
  "IMG_1646.jpeg": `Rabbit three ways — ballotine, rack, and confit leg — with caramelized kumquat, braised celery, wild mushrooms, and a rich jus. Classic French technique applied to a protein that rewards the patience.`,
  "68013245999__EBBBF76F-CCBE-4F66-9FBD-C80579A48C7A.jpeg": `Plating class: roasted root vegetables on a black plate — carrots, beet, couscous crumble, red onion ribbons, fresh dill, edible flowers. Everything placed with a reason: color, texture, temperature, shape.`,
  "IMG_2273.jpg": `RootdownLA, season 2 — 13 weeks, hands-on, real kitchens. Bent over a student's station, correcting the cut. This is where it actually gets taught.`,
  "IMG_7037.jpeg": `Çoban salatası — the shepherd's salad, reimagined. Whole marinated cherry tomatoes heaped in a roasted artichoke shell with cucumber, red onion, and fresh dill. The bowl is edible.`,
  "IMG_7039.jpeg": `John Dory with crispy potato scales, Turkish çoban salad in an artichoke shell, and pommes sarladaises. A plate that crosses the Mediterranean without losing its footing.`,
  "IMG_8547.jpeg": `After Michael Voltaggio — chocolate, multiple ways. Dark shards, ice cream, white chocolate, melon ribbon, cocoa crumble. A dessert that makes you look at chocolate like it has dimensions.`,
  "IMG_6958.jpg": `Deconstructed Snickers — peanut butter-caramel cake, dark chocolate shell, caramel popcorn, fleur de sel. It tastes exactly like you think it does, only better.`,
  "Resized_Resized_20240412_141418_1712956535652_1712956538591.JPG": `Private lesson — trussing a roulade at a student's home kitchen. Full chef whites, full attention. The technique doesn't change because the kitchen is smaller.`,
};

(async () => {
  setGlobalStatus('Loading saved descriptions…');
  let saved = {};
  try { saved = await loadAll(); } catch(e) {}
  setGlobalStatus('Ready. Descriptions save automatically.', '');

  const gallery = document.getElementById('gallery');
  IMAGES.forEach((filename, i) => {
    const card = document.createElement('div');
    card.className = 'card';

    const imgSrc = 'images/' + filename;
    const savedDesc = saved[filename] || ENHANCED[filename] || '';

    card.innerHTML = `
      <div class="img-wrap">
        <img src="${imgSrc}" alt="Photo ${i+1}" loading="lazy" />
        <span class="img-num">#${i + 1}</span>
        <span class="card-save" id="cs-${i}"></span>
      </div>
      <div class="card-body">
        <span class="filename">${filename}</span>
        <label class="desc-label">Description</label>
        <textarea placeholder="Describe this dish or moment...">${savedDesc}</textarea>
      </div>
    `;
    gallery.appendChild(card);

    const ta = card.querySelector('textarea');
    const cardSaveEl = card.querySelector('.card-save');
    ta.addEventListener('input', () => onInput(filename, ta.value, cardSaveEl));
  });
})();
</script>
</body>
</html>
